<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A-Frame Project Work </title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #5ba3d0; }

    /* Cinematic letterbox bars */
    body::before, body::after {
      content: '';
      position: fixed;
      left: 0; right: 0;
      height: 36px;
      background: rgba(0,0,0,0.78);
      z-index: 100;
      pointer-events: none;
    }
    body::before { top: 0; }
    body::after  { bottom: 0; }

    /* Vignette */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.52) 100%);
      pointer-events: none;
      z-index: 50;
    }

    /* CSS sky layer behind canvas */
    #sky-layer {
      position: fixed; inset: 0;
      overflow: hidden;
      z-index: 0;
      background: linear-gradient(180deg, #3d88c8 0%, #6ab4e0 40%, #a8d8f0 72%, #cceef8 100%);
    }
    .cloud {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.80);
      filter: blur(24px);
      animation: drift linear infinite;
    }
    @keyframes drift {
      0%   { transform: translateX(-220px); opacity: 0;   }
      6%   { opacity: 1; }
      94%  { opacity: 0.85; }
      100% { transform: translateX(112vw);  opacity: 0;   }
    }
    a-scene { position: relative; z-index: 10; }
  </style>
</head>
<body>

<div id="sky-layer">
  <div class="cloud" style="width:400px;height:115px;top:4% ;left:-5% ;animation-duration:72s ;animation-delay:0s;"></div>
  <div class="cloud" style="width:260px;height:78px ;top:9% ;left:32% ;animation-duration:92s ;animation-delay:-26s;opacity:.70;"></div>
  <div class="cloud" style="width:540px;height:135px;top:2% ;left:62% ;animation-duration:60s ;animation-delay:-12s;"></div>
  <div class="cloud" style="width:190px;height:58px ;top:15%;left:12% ;animation-duration:108s;animation-delay:-48s;opacity:.55;"></div>
  <div class="cloud" style="width:320px;height:95px ;top:7% ;left:50% ;animation-duration:80s ;animation-delay:-36s;opacity:.65;"></div>
  <div class="cloud" style="width:460px;height:125px;top:3% ;left:76% ;animation-duration:66s ;animation-delay:-5s ;"></div>
  <div class="cloud" style="width:680px;height:65px ;top:1% ;left:3%  ;animation-duration:145s;animation-delay:-78s;opacity:.22;filter:blur(38px);"></div>
</div>

<div id="vignette"></div>

<!-- ================================================================
     A-FRAME SCENE — Outdoor Garden Terrace
     All geometry: a-box, a-cylinder, a-sphere, a-cone, a-torus, a-plane only.
     Table top Y = 1.038. Items on table: Y = 1.038 + item_half_height.
     Chair 1 front (Z = +1.42), Chair 2 back (Z = -1.42, rotated 180°).
================================================================= -->
<a-scene
  shadow="type: pcfsoft; autoUpdate: true"
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; toneMapping: ACESFilmic; toneMappingExposure: 1.1"
  vr-mode-ui="enabled: true"
  fog="type: linear; color: #b8ddf5; near: 24; far: 62">

  <!-- CAMERA — positioned front-right, angled toward table centre -->
  <a-entity id="rig" position="0.6 1.90 4.10">
    <a-camera
    position="4 3 6"
    rotation="-20 -35 0"
    look-controls="pointerLockEnabled: false"
    wasd-controls="acceleration: 14"
    fov="64"
    near="0.04"
    far="80">
</a-camera>
  </a-entity>

  <!-- SKY (transparent — CSS gradient handles it) -->
  <a-sky color="#5aaedd" radius="65" opacity="0.0001"></a-sky>

  <!-- Atmosphere haze dome -->
  <a-sphere position="0 -10 0" radius="60" color="#a0d4f0"
    roughness="1" metalness="0" opacity="0.16" side="back">
  </a-sphere>

  <!-- Sun disc + glow rings -->
  <a-sphere position="20 26 -54" radius="3.2" color="#fffce8" roughness="0" metalness="0" opacity="0.95"></a-sphere>
  <a-sphere position="20 26 -54" radius="5.5" color="#fff0b8" roughness="0" metalness="0" opacity="0.18"></a-sphere>
  <a-sphere position="20 26 -54" radius="8.5" color="#ffe898" roughness="0" metalness="0" opacity="0.07"></a-sphere>

  <!-- ═══ LIGHTING ═══════════════════════════════════════════ -->
  <a-light type="ambient"     color="#d5e8ff" intensity="0.62"></a-light>
  <a-light type="directional" color="#fff8e0" intensity="1.50"
    position="20 26 -8"
    cast-shadow="true"
    shadow-camera-left="-10" shadow-camera-right="10"
    shadow-camera-top="10"   shadow-camera-bottom="-10"
    shadow-map-width="2048"  shadow-map-height="2048"
    shadow-bias="-0.0005">
  </a-light>
  <!-- Sky bounce -->
  <a-light type="point" color="#90c4ff" intensity="0.48" position="0 22 0" distance="60" decay="1"></a-light>
  <!-- Table focal fill -->
  <a-light type="point" color="#ffe8a0" intensity="1.00" position="0 3.2 0.3" distance="6" decay="2"></a-light>
  <!-- Grass bounce -->
  <a-light type="point" color="#80c850" intensity="0.18" position="0 0.5 2.0" distance="5" decay="2"></a-light>

  <!-- ═══ GROUND ══════════════════════════════════════════════ -->
  <!-- Grass lawn -->
  <a-plane position="0 0 0" rotation="-90 0 0" width="90" height="90"
    color="#4e8c2e" roughness="0.94" receive-shadow="true">
  </a-plane>

  <!-- Patio stone slab — 7.4 × 6.4, centred at origin -->
  <a-plane position="0 0.014 0" rotation="-90 0 0" width="7.4" height="6.4"
    color="#cfc3a8" roughness="0.78" metalness="0.02" receive-shadow="true">
  </a-plane>
  <!-- Flagstone grout — horizontal -->
  <a-box position="0 0.018 -2.1" width="7.4" height="0.005" depth="0.030" color="#a89c82" roughness="0.84"></a-box>
  <a-box position="0 0.018  0.0" width="7.4" height="0.005" depth="0.030" color="#a89c82" roughness="0.84"></a-box>
  <a-box position="0 0.018  2.1" width="7.4" height="0.005" depth="0.030" color="#a89c82" roughness="0.84"></a-box>
  <!-- Flagstone grout — vertical -->
  <a-box position="-2.3 0.018 0" width="0.030" height="0.005" depth="6.4" color="#a89c82" roughness="0.84"></a-box>
  <a-box position=" 0.0 0.018 0" width="0.030" height="0.005" depth="6.4" color="#a89c82" roughness="0.84"></a-box>
  <a-box position=" 2.3 0.018 0" width="0.030" height="0.005" depth="6.4" color="#a89c82" roughness="0.84"></a-box>
  <!-- Patio raised edge -->
  <a-box position=" 0    0.032  3.22" width="7.44" height="0.062" depth="0.16" color="#c0b49a" roughness="0.72"></a-box>
  <a-box position=" 0    0.032 -3.22" width="7.44" height="0.062" depth="0.16" color="#c0b49a" roughness="0.72"></a-box>
  <a-box position="-3.74 0.032  0"    width="0.16" height="0.062" depth="6.64" color="#c0b49a" roughness="0.72"></a-box>
  <a-box position=" 3.74 0.032  0"    width="0.16" height="0.062" depth="6.64" color="#c0b49a" roughness="0.72"></a-box>
  <!-- Shadow under table -->
  <a-plane position="0 0.019 0.1" rotation="-90 0 0" width="3.0" height="2.6"
    color="#100800" roughness="0.99" opacity="0.16">
  </a-plane>

       Pole base at Y=0, pole centre at Y=2.6 (height 5.2).
       Canopy cone bottom at Y=4.72, top at Y=5.82.
  ════════════════════════════════════════════════════════════ -->

  <a-cylinder position="0 2.60 0" radius="0.030" height="5.20"
    color="#d4d0c8" roughness="0.22" metalness="0.72" cast-shadow="true">
  </a-cylinder>
  <!-- Base plate -->
  <a-cylinder position="0 0.065 0" radius="0.155" height="0.130"
    color="#c8c4bc" roughness="0.32" metalness="0.68">
  </a-cylinder>
  <a-torus position="0 0.130 0" radius="0.150" radius-tubular="0.012"
    color="#b8b4ac" roughness="0.28" metalness="0.72">
  </a-torus>
  <!-- Canopy — sage green -->
  <a-cone position="0 5.27 0"

    color="#8aaa72" roughness="0.48" metalness="0.03" cast-shadow="true">

  <!-- 8 ribs -->

  <a-cylinder position="-1.50 4.88  0"    radius="0.013" height="3.10" rotation=" 0  0 -73" color="#e4e0d4" roughness="0.38"></a-cylinder>
  <a-cylinder position=" 0    4.88  1.50" radius="0.013" height="3.10" rotation="73  0   0" color="#e4e0d4" roughness="0.38"></a-cylinder>
  <a-cylinder position=" 0    4.88 -1.50" radius="0.013" height="3.10" rotation="-73 0   0" color="#e4e0d4" roughness="0.38"></a-cylinder>
  <a-cylinder position=" 1.06 4.88  1.06" radius="0.011" height="3.06" rotation="52  0  52" color="#d8d4c8" roughness="0.40"></a-cylinder>
  <a-cylinder position="-1.06 4.88  1.06" radius="0.011" height="3.06" rotation="52  0 -52" color="#d8d4c8" roughness="0.40"></a-cylinder>
  <a-cylinder position=" 1.06 4.88 -1.06" radius="0.011" height="3.06" rotation="-52 0  52" color="#d8d4c8" roughness="0.40"></a-cylinder>
  <a-cylinder position="-1.06 4.88 -1.06" radius="0.011" height="3.06" rotation="-52 0 -52" color="#d8d4c8" roughness="0.40"></a-cylinder>
  <!-- Valance (8 scallop flaps) -->
  <a-cone position=" 2.98 4.72  0"    radius-bottom="0.26" radius-top="0.04" height="0.36" rotation=" 0  0  96" color="#7a9e62" roughness="0.50"></a-cone>
  <a-cone position="-2.98 4.72  0"    radius-bottom="0.26" radius-top="0.04" height="0.36" rotation=" 0  0 -96" color="#7a9e62" roughness="0.50"></a-cone>
  <a-cone position=" 0    4.72  2.98" radius-bottom="0.26" radius-top="0.04" height="0.36" rotation="96  0   0" color="#7a9e62" roughness="0.50"></a-cone>
  <a-cone position=" 0    4.72 -2.98" radius-bottom="0.26" radius-top="0.04" height="0.36" rotation="-96 0   0" color="#7a9e62" roughness="0.50"></a-cone>
  <a-cone position=" 2.11 4.72  2.11" radius-bottom="0.22" radius-top="0.04" height="0.32" rotation="68  0  68" color="#6e9258" roughness="0.50"></a-cone>
  <a-cone position="-2.11 4.72  2.11" radius-bottom="0.22" radius-top="0.04" height="0.32" rotation="68  0 -68" color="#6e9258" roughness="0.50"></a-cone>
  <a-cone position=" 2.11 4.72 -2.11" radius-bottom="0.22" radius-top="0.04" height="0.32" rotation="-68 0  68" color="#6e9258" roughness="0.50"></a-cone>
  <a-cone position="-2.11 4.72 -2.11" radius-bottom="0.22" radius-top="0.04" height="0.32" rotation="-68 0 -68" color="#6e9258" roughness="0.50"></a-cone>
  <!-- Centre hub & finial -->
  <a-torus position="0 5.20 0" radius="0.065" radius-tubular="0.014" color="#b8c8a0" roughness="0.28" metalness="0.16"></a-torus>
  <a-cylinder position="0 5.58 0" radius="0.016" height="0.25" color="#d0c870" roughness="0.14" metalness="0.76"></a-cylinder>
  <a-sphere   position="0 5.72 0" radius="0.060" color="#e8d880" roughness="0.10" metalness="0.82"></a-sphere>

  <!-- ═══ TABLE ════════════════════════════════════════════════
       Round pedestal table. Seat height ~0.750.
       Table top surface: Y=1.038 (top face).
       Items rest on Y = 1.038 + half_their_height.
  ════════════════════════════════════════════════════════════ -->
  <!-- Tablecloth disc -->
  <a-cylinder position="0 1.025 0" radius="0.730" height="0.018"
    color="#f5f1e5" roughness="0.62" metalness="0.01" receive-shadow="true">
  </a-cylinder>
  <!-- Cloth drape torus -->
  <a-torus position="0 0.975 0" radius="0.725" radius-tubular="0.038" color="#edeadc" roughness="0.68"></a-torus>
  <a-torus position="0 0.945 0" radius="0.718" radius-tubular="0.026" color="#e8e4d6" roughness="0.70"></a-torus>
  <!-- Table top -->
  <a-cylinder position="0 1.010 0" radius="0.710" height="0.055"
    color="#f8f5f0" roughness="0.22" metalness="0.08"
    cast-shadow="true" receive-shadow="true">
  </a-cylinder>
  <!-- Rim torus -->
  <a-torus position="0 1.010 0" radius="0.710" radius-tubular="0.028" color="#e8e4da" roughness="0.20" metalness="0.10"></a-torus>
  <!-- Pedestal column (Y centre = 0.525, height 1.005 → top at 1.027, bottom at 0.022) -->
  <a-cylinder position="0 0.525 0" radius="0.040" height="1.005"
    color="#e8e4da" roughness="0.28" metalness="0.18">
  </a-cylinder>
  <!-- Column rings -->
  <a-torus position="0 0.620 0" radius="0.052" radius-tubular="0.011" color="#d8d4ca" roughness="0.26" metalness="0.20"></a-torus>
  <a-torus position="0 0.420 0" radius="0.052" radius-tubular="0.011" color="#d8d4ca" roughness="0.26" metalness="0.20"></a-torus>
  <!-- Base cross feet -->
  <a-box position="0 0.036 0" width="1.18" height="0.034" depth="0.040" color="#e0dcd2" roughness="0.34" metalness="0.16"></a-box>
  <a-box position="0 0.036 0" width="0.040" height="0.034" depth="1.18" color="#e0dcd2" roughness="0.34" metalness="0.16"></a-box>
  <!-- Foot arch scrolls -->
  <a-torus position=" 0.40 0.058  0"    radius="0.115" radius-tubular="0.013" arc="180" rotation="0 0  90" color="#d8d4ca" roughness="0.28" metalness="0.18"></a-torus>
  <a-torus position="-0.40 0.058  0"    radius="0.115" radius-tubular="0.013" arc="180" rotation="0 0 -90" color="#d8d4ca" roughness="0.28" metalness="0.18"></a-torus>
  <a-torus position=" 0    0.058  0.40" radius="0.115" radius-tubular="0.013" arc="180" rotation="90 0 0"  color="#d8d4ca" roughness="0.28" metalness="0.18"></a-torus>
  <a-torus position=" 0    0.058 -0.40" radius="0.115" radius-tubular="0.013" arc="180" rotation="-90 0 0" color="#d8d4ca" roughness="0.28" metalness="0.18"></a-torus>
  <!-- Foot tip caps -->
  <a-sphere position=" 0.56 0.040  0"    radius="0.028" color="#ccc8be" roughness="0.38"></a-sphere>
  <a-sphere position="-0.56 0.040  0"    radius="0.028" color="#ccc8be" roughness="0.38"></a-sphere>
  <a-sphere position=" 0    0.040  0.56" radius="0.028" color="#ccc8be" roughness="0.38"></a-sphere>
  <a-sphere position=" 0    0.040 -0.56" radius="0.028" color="#ccc8be" roughness="0.38"></a-sphere>

  <!-- ═══════════════════════════════════════════════════════════
       WROUGHT-IRON GARDEN CHAIRS  — deep hunter green
       Colour palette: #1a3d1a base · #223d22 highlight · #142a14 shadow
       Design: every joint has a sphere cap so nothing looks floating.
       Legs top/bottom are exact. Back uprights begin at seat-frame ring.
       Cushion Chair1 = terracotta · Chair2 = sage green
  ═══════════════════════════════════════════════════════════ -->

  <!-- ================= CHAIRS ================= -->

<!-- ───────── CHAIR 1 (Front) ───────── -->
<a-entity position="0 0 1.42">

  <!-- LEGS -->
  <a-cylinder position="-0.25 0.36 -0.20" radius="0.025" height="0.72" color="#1a3d1a"></a-cylinder>

  <!-- ═══ TABLE ITEMS ══════════════════════════════════════════
       Table top face at Y = 1.038.

  ════════════════════════════════════════════════════════════ -->
